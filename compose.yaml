
services:
###> symfony/framework-bundle ###
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proinvestment_web
    restart: always
    env_file:
      - .env.local
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      APP_SECRET: ${APP_SECRET}
      MAILER_DSN: ${MAILER_DSN}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16
    volumes:
      - ./public:/app/public:ro
      - ./var:/app/var:rw
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started
    networks:
      - app-network

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: proinvestment_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - app-network
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit:latest
    container_name: proinvestment_mailer
    restart: always
    networks:
      - app-network
###< symfony/mailer ###

  nginx:
    image: nginx:alpine
    container_name: proinvestment_nginx
    restart: always
    ports:
      - "${SYMFONY_PORT:-8080}:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/app/public:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - app-network

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###

networks:
  app-network:
    driver: bridge
